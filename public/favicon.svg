<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background with subtle gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" /> <!-- Primary Emerald -->
      <stop offset="100%" stop-color="#059669" /> <!-- Darker Emerald -->
    </linearGradient>
    <linearGradient id="lGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>
  </defs>
  
  <!-- App Icon Base -->
  <rect width="120" height="120" rx="30" fill="url(#bgGrad)" />
  
  <!-- Abstract Book / L Shape -->
  <path d="M 35 35 
           L 55 35 
           L 55 65
           L 85 65
           L 85 85
           L 35 85
           Z" 
        fill="url(#lGrad)" 
        filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.2))" />
        
  <!-- Tech Spark / Dot representing AI/Tech -->
  <circle cx="75" cy="45" r="12" fill="#F59E0B" filter="drop-shadow(0px 2px 4px rgba(245,158,11,0.4))" />
</svg>